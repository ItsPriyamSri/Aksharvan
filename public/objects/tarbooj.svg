<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .melon { animation: jiggle 2s ease-in-out infinite; transform-origin: 100px 110px; }
      .drip { animation: drip 2s ease-in-out infinite; transform-origin: 100px 155px; }
      @keyframes jiggle { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(3deg)} 75%{transform:rotate(-3deg)} }
      @keyframes drip { 0%,70%,100%{transform:translateY(0);opacity:1} 85%{transform:translateY(12px);opacity:0} }
    </style>
  </defs>
  <rect width="200" height="200" rx="32" fill="rgba(76,175,125,0.12)"/>
  <rect width="200" height="200" rx="32" fill="none" stroke="#4CAF7D" stroke-width="2.5" opacity="0.4"/>
  <g class="melon">
    <ellipse cx="100" cy="110" rx="58" ry="48" fill="#4CAF50"/>
    <ellipse cx="100" cy="110" rx="58" ry="48" fill="none" stroke="#388E3C" stroke-width="2.5"/>
    <path d="M55 90 Q100 75 145 90" fill="none" stroke="#388E3C" stroke-width="2" opacity="0.5"/>
    <path d="M48 110 Q100 95 152 110" fill="none" stroke="#388E3C" stroke-width="2" opacity="0.5"/>
    <path d="M55 130 Q100 118 145 130" fill="none" stroke="#388E3C" stroke-width="2" opacity="0.5"/>
    <!-- Cut face -->
    <path d="M65 110 Q100 75 135 110 Q135 150 100 155 Q65 150 65 110Z" fill="#E53935"/>
    <path d="M65 110 Q100 95 135 110" fill="#F44336"/>
    <ellipse cx="100" cy="130" rx="30" ry="20" fill="#EF9A9A" opacity="0.4"/>
    <!-- Seeds -->
    <ellipse cx="85" cy="120" rx="4" ry="6" fill="#1B5E20" transform="rotate(-10 85 120)"/>
    <ellipse cx="100" cy="118" rx="4" ry="6" fill="#1B5E20"/>
    <ellipse cx="115" cy="120" rx="4" ry="6" fill="#1B5E20" transform="rotate(10 115 120)"/>
    <ellipse cx="90" cy="135" rx="4" ry="6" fill="#1B5E20" transform="rotate(-5 90 135)"/>
    <ellipse cx="110" cy="135" rx="4" ry="6" fill="#1B5E20" transform="rotate(5 110 135)"/>
  </g>
  <path class="drip" d="M100 155 Q103 160 100 168" fill="none" stroke="#F44336" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="194" text-anchor="middle" font-size="18" font-family="Mukta,sans-serif" fill="#2E7D32" font-weight="800">तरबूज</text>
</svg>
