<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .secondHand { animation: tick 1s steps(60,end) infinite; transform-origin: 100px 108px; }
      .minuteHand { animation: rotate60 60s linear infinite; transform-origin: 100px 108px; }
      .hourHand { animation: rotate12 43200s linear infinite; transform-origin: 100px 108px; }
      .pendulum { animation: pendulum 1s ease-in-out infinite; transform-origin: 100px 155px; }
      @keyframes tick { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      @keyframes rotate60 { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      @keyframes rotate12 { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      @keyframes pendulum { 0%,100%{transform:rotate(-20deg)} 50%{transform:rotate(20deg)} }
    </style>
  </defs>
  <rect width="200" height="200" rx="32" fill="rgba(255,200,74,0.12)"/>
  <rect width="200" height="200" rx="32" fill="none" stroke="#FFB300" stroke-width="2.5" opacity="0.4"/>
  <circle cx="100" cy="108" r="52" fill="#FFF8E1"/>
  <circle cx="100" cy="108" r="52" fill="none" stroke="#FFB300" stroke-width="4"/>
  <circle cx="100" cy="108" r="45" fill="none" stroke="#FFE082" stroke-width="1.5"/>
  <!-- Hour markers -->
  <line x1="100" y1="60" x2="100" y2="70" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  <line x1="148" y1="108" x2="138" y2="108" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="156" x2="100" y2="146" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="108" x2="62" y2="108" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  <line x1="136" y1="72" x2="130" y2="80" stroke="#5D4037" stroke-width="2"/>
  <line x1="136" y1="144" x2="130" y2="136" stroke="#5D4037" stroke-width="2"/>
  <line x1="64" y1="144" x2="70" y2="136" stroke="#5D4037" stroke-width="2"/>
  <line x1="64" y1="72" x2="70" y2="80" stroke="#5D4037" stroke-width="2"/>
  <!-- Hour hand -->
  <line class="hourHand" x1="100" y1="108" x2="100" y2="80" stroke="#5D4037" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line class="minuteHand" x1="100" y1="108" x2="130" y2="108" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Second hand -->
  <line class="secondHand" x1="100" y1="120" x2="100" y2="68" stroke="#F44336" stroke-width="2" stroke-linecap="round"/>
  <circle cx="100" cy="108" r="5" fill="#5D4037"/>
  <circle cx="100" cy="108" r="2" fill="white"/>
  <text x="100" y="194" text-anchor="middle" font-size="18" font-family="Mukta,sans-serif" fill="#E65100" font-weight="800">घड़ी</text>
</svg>
