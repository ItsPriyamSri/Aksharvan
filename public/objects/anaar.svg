<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .pomegranate { animation: bounce 1.5s ease-in-out infinite; transform-origin: 100px 115px; }
      .sparkle1 { animation: sparkle 1.5s ease-in-out infinite 0s; }
      .sparkle2 { animation: sparkle 1.5s ease-in-out infinite 0.5s; }
      .sparkle3 { animation: sparkle 1.5s ease-in-out infinite 1s; }
      @keyframes bounce { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-8px) scale(1.03)} }
      @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1)} }
    </style>
  </defs>
  <rect width="200" height="200" rx="32" fill="rgba(229,57,53,0.1)"/>
  <rect width="200" height="200" rx="32" fill="none" stroke="#E53935" stroke-width="2.5" opacity="0.4"/>
  <g class="pomegranate">
    <circle cx="100" cy="118" r="50" fill="#E53935"/>
    <circle cx="100" cy="118" r="50" fill="none" stroke="#B71C1C" stroke-width="2"/>
    <path d="M75 95 Q100 80 125 95" fill="#B71C1C" opacity="0.4"/>
    <!-- Crown -->
    <path d="M88 70 L92 60 L96 68 L100 55 L104 68 L108 60 L112 70 Q100 65 88 70Z" fill="#388E3C"/>
    <rect x="92" y="68" width="16" height="8" rx="3" fill="#795548"/>
    <!-- Seeds showing through -->
    <circle cx="88" cy="105" r="5" fill="#FCE4EC" opacity="0.7"/>
    <circle cx="100" cy="100" r="5" fill="#FCE4EC" opacity="0.7"/>
    <circle cx="112" cy="105" r="5" fill="#FCE4EC" opacity="0.7"/>
    <circle cx="85" cy="118" r="5" fill="#FCE4EC" opacity="0.7"/>
    <circle cx="100" cy="115" r="5" fill="#FCE4EC" opacity="0.7"/>
    <circle cx="115" cy="118" r="5" fill="#FCE4EC" opacity="0.7"/>
    <circle cx="90" cy="130" r="5" fill="#FCE4EC" opacity="0.7"/>
    <circle cx="110" cy="130" r="5" fill="#FCE4EC" opacity="0.7"/>
  </g>
  <text class="sparkle1" x="42" y="90" font-size="16" text-anchor="middle">✨</text>
  <text class="sparkle2" x="158" y="85" font-size="14" text-anchor="middle">⭐</text>
  <text class="sparkle3" x="155" y="140" font-size="12" text-anchor="middle">✨</text>
  <text x="100" y="194" text-anchor="middle" font-size="18" font-family="Mukta,sans-serif" fill="#C62828" font-weight="800">अनार</text>
</svg>
